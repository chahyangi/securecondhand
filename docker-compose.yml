services:
  postgres:
    image: postgres:16
    container_name: securecondhand-postgres
    environment:
      POSTGRES_DB: securecondhand
      POSTGRES_USER: securecondhand
      POSTGRES_PASSWORD: securecondhand
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
